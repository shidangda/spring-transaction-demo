server:
  port: 8081
  servlet:
    context-path: /api

spring:
  application:
    name: spring-transaction-demo
  
  # DevTools 配置（调试时建议禁用）
  devtools:
    restart:
      enabled: false  # 禁用自动重启
  
  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/transaction_demo?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  # 注意：MyBatis 配置应放在顶层，不在 spring 下
        
  # 事务配置
  transaction:
    rollback-on-commit-failure: true

# 日志配置
logging:
  level:
    com.example: DEBUG
    org.springframework.transaction: DEBUG
    org.mybatis: DEBUG
  charset:
    console: UTF-8
    file: UTF-8

# MyBatis 配置（顶层）
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.entity
  configuration:
    map-underscore-to-camel-case: true
